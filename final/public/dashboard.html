<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <div id="app">
      <div id="dashboard">
        <h2>Congratulations!</h2>
        <p id="dashboard-passkey-greeting" style="display: none">
          Signed in as <strong id="passkey-friendly-name"></strong>
        </p>
        <ul id="verification-checklist">
          <li id="checklist-phone"><span class="checklist-icon"></span> Phone</li>
          <li id="checklist-email"><span class="checklist-icon"></span> Email</li>
          <li id="checklist-passkey"><span class="checklist-icon"></span> Passkey</li>
        </ul>
        <p>You have completed onboarding!</p>
        <button id="setup-passkey-btn" style="display: none">Set up a Passkey</button>
        <a href="#" id="start-over-link" class="skip-link">Start over</a>
      </div>
    </div>

    <script src="/js/shared.js"></script>
    <script src="/js/dashboard.js"></script>
  </body>
</html>
